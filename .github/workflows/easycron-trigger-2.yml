# Generated by easycron — https://github.com/easycron/cli
# Schedule: */5 * * * *
# Target: https://webhook.site/ecdc170f-7421-41c0-aa22-641304eb173d
# Method: GET
#
# ⚠️ GitHub Actions schedules use UTC time.
# ⚠️ Intervals < 5 min may exhaust free tier quickly (2000 min/month).
#
# 💡 Retry config: MAX_RETRIES=3, RETRY_DELAY=10s
#    Edit these values below if your server needs more boot time.

name: easycron-trigger
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # Allow manual trigger for testing

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Hit Endpoint with Smart Retry
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=10
          TIMEOUT=10
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES..."
            
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -m $TIMEOUT "https://webhook.site/ecdc170f-7421-41c0-aa22-641304eb173d") || true
            
            # Success (2xx)
            if [ "$HTTP_CODE" -ge 200 ] 2>/dev/null && [ "$HTTP_CODE" -lt 300 ] 2>/dev/null; then
              echo "✔ Success (HTTP $HTTP_CODE)"
              exit 0
            fi
            
            # 5xx = server error, fail immediately (don't retry app crashes)
            if [ "$HTTP_CODE" -ge 500 ] 2>/dev/null && [ "$HTTP_CODE" -lt 600 ] 2>/dev/null; then
              echo "✖ Server error (HTTP $HTTP_CODE) — not retrying"
              exit 1
            fi
            
            # 4xx = client error, fail immediately (bad request/auth)
            if [ "$HTTP_CODE" -ge 400 ] 2>/dev/null && [ "$HTTP_CODE" -lt 500 ] 2>/dev/null; then
              echo "✖ Client error (HTTP $HTTP_CODE) — check URL/auth"
              exit 1
            fi
            
            # Timeout or connection refused = server likely cold-starting
            if [ $i -lt $MAX_RETRIES ]; then
              echo "⏳ Request failed (HTTP $HTTP_CODE), retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done
          
          echo "✖ All $MAX_RETRIES attempts failed"
          exit 1
